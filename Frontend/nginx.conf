server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Only proxy the OAuth2 authorization initiation to backend
    location /oauth2/authorization {
        proxy_pass http://study_planner_backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy API calls to backend
    location /api {
        proxy_pass http://study_planner_backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /actuator {
        proxy_pass http://study_planner_backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /login/oauth2 {
        proxy_pass http://study_planner_backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA routing - let React handle everything else including /oauth2/redirect
    location / {
        try_files $uri $uri/ /index.html;
    }
}